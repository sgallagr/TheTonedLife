<div class="ttl-video-facade" data-video="{{ include.id }}" data-title="{{ include.title }}" role="button" tabindex="0" aria-label="Play video: {{ include.title }}" style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;max-width:100%;margin:1em 0;cursor:pointer;background:#000;border-radius:4px;">
  <img src="{{ include.poster }}" alt="Play video: {{ include.title }}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;">
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:68px;height:48px;background:rgba(0,0,0,.65);border-radius:12px;"></div>
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);margin-left:4px;width:0;height:0;border-style:solid;border-width:11px 0 11px 19px;border-color:transparent transparent transparent #fff;"></div>
</div>
<noscript><p><a href="https://www.youtube.com/watch?v={{ include.id }}">Watch on YouTube: {{ include.title }}</a></p></noscript>
